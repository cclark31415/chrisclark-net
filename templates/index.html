<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Clark</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #2a3b9c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        header h1 {
            color: white;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 16px;
            margin-top: 8px;
        }

        .section-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .apps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .app-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .app-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #2a3b9c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 22px;
        }

        .app-info {
            flex: 1;
        }

        .app-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .app-desc {
            font-size: 13px;
            color: #666;
            margin-top: 2px;
        }

        .app-arrow {
            color: #ccc;
            font-size: 18px;
            flex-shrink: 0;
        }

        footer {
            text-align: center;
            margin-top: 48px;
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Chris Clark</h1>
            <p>A few things I've built</p>
        </header>

        <div class="section-label">Apps</div>
        <div class="apps">
            <a class="app-card" href="https://mypublicip.chrisclark.net">
                <div class="app-icon">&#127760;</div>
                <div class="app-info">
                    <div class="app-name">What's My IP?</div>
                    <div class="app-desc">See your public IP address and browser info</div>
                </div>
                <div class="app-arrow">&#8250;</div>
            </a>
        </div>

        <footer>
            <p>chrisclark.net</p>
        </footer>
    </div>
</body>
</html>
